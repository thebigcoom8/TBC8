<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Orbitron:wght@500;700&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; }

        :root {
            --bg:       #07091a;
            --surface:  rgba(255,255,255,0.03);
            --border:   rgba(180,160,240,0.12);
            --lavender: #c4b5e8;
            --violet:   #9d87d4;
            --gold:     #e4c87a;
            --rose:     #d4a8b8;
            --dim:      rgba(180,160,220,0.45);
        }

        /* ── OUTER SHELL ──────────────────────────────────── */
        nav {
            position: relative;
            background: var(--bg);
            overflow: hidden;
        }

        /* Grain texture */
        nav::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 160px;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Bottom gradient line */
        nav::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                var(--violet) 30%,
                var(--gold) 55%,
                var(--rose) 75%,
                transparent 100%);
            opacity: 0.5;
        }

        /* ── INNER LAYOUT ─────────────────────────────────── */
        .nav-inner {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: stretch;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── LOGO BLOCK ───────────────────────────────────── */
        .logo-block {
            display: flex;
            align-items: center;
            padding: 16px 32px 16px 28px;
            flex-shrink: 0;
            position: relative;
        }

        .logo-block::after {
            content: '';
            position: absolute;
            right: 0; top: 22%; bottom: 22%;
            width: 1px;
            background: linear-gradient(180deg,
                transparent,
                var(--violet) 40%,
                var(--gold) 60%,
                transparent);
            opacity: 0.35;
        }

        .logo-block a {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--lavender);
            display: flex;
            align-items: center;
            gap: 11px;
            transition: color 0.3s ease;
        }

        .logo-mark {
            position: relative;
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .logo-mark svg { width: 100%; height: 100%; overflow: visible; }

        .logo-mark .ring {
            animation: ringPulse 4s ease-in-out infinite;
            transform-origin: 11px 11px;
        }

        .logo-mark .dot-center { animation: dotBreathe 4s ease-in-out infinite; }

        @keyframes ringPulse {
            0%, 100% { opacity: 0.5; transform: scale(1) rotate(0deg); }
            50%       { opacity: 0.9; transform: scale(1.12) rotate(45deg); }
        }

        @keyframes dotBreathe {
            0%, 100% { opacity: 0.7; r: 2; }
            50%       { opacity: 1;   r: 2.8; }
        }

        .logo-block a:hover { color: #f0eaff; }

        /* ── LINKS BLOCK ──────────────────────────────────── */
        .links-block {
            display: flex;
            align-items: center;
            padding: 0 20px 0 28px;
            flex: 1;
            gap: 2px;
        }

        .links-block a {
            position: relative;
            font-family: 'Cormorant Garamond', serif;
            font-size: 14.5px;
            font-weight: 400;
            letter-spacing: 0.3px;
            color: var(--dim);
            text-decoration: none;
            padding: 9px 14px;
            border-radius: 6px;
            transition: color 0.25s ease;
            white-space: nowrap;
            z-index: 0;
        }

        /* Frosted pill that springs in on hover */
        .links-block a::before {
            content: '';
            position: absolute;
            inset: 2px 0;
            border-radius: 6px;
            background: linear-gradient(135deg,
                rgba(157,135,212,0.14),
                rgba(212,168,184,0.08));
            border: 1px solid rgba(196,181,232,0.18);
            box-shadow: 0 0 16px rgba(157,135,212,0.12) inset;
            opacity: 0;
            transform: scaleX(0.7) scaleY(0.6);
            transition: opacity 0.3s ease,
                        transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            z-index: -1;
        }

        /* Index number floats up on hover */
        .links-block a::after {
            content: attr(data-index);
            position: absolute;
            top: -2px; right: 6px;
            font-family: 'DM Mono', monospace;
            font-size: 7px;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--gold);
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .links-block a:hover { color: #f5f0ff; }
        .links-block a:hover::before { opacity: 1; transform: scaleX(1) scaleY(1); }
        .links-block a:hover::after  { opacity: 0.7; transform: translateY(0); }

        /* ── AMBIENT GLOW ORBS ────────────────────────────── */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(40px);
            animation: orbDrift var(--dur, 8s) ease-in-out infinite alternate;
        }
        .orb-1 { width: 120px; height: 60px; background: rgba(149,128,212,0.12); top: -10px; left: 60px;   --dur: 7s; }
        .orb-2 { width: 80px;  height: 50px; background: rgba(228,200,122,0.08); top: 0;    right: 200px;  --dur: 10s; }

        @keyframes orbDrift {
            0%   { transform: translateX(0) translateY(0); }
            100% { transform: translateX(20px) translateY(8px); }
        }

        /* ── HAMBURGER ────────────────────────────────────── */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            margin-left: auto;
            margin-right: 20px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 9px 10px;
            transition: border-color 0.25s, background 0.25s;
        }

        .hamburger:hover {
            background: var(--surface);
            border-color: rgba(196,181,232,0.3);
        }

        .hamburger span {
            display: block;
            height: 1px;
            border-radius: 99px;
            transition: width 0.25s ease;
        }

        .hamburger span:nth-child(1) { width: 18px; background: var(--lavender); }
        .hamburger span:nth-child(2) { width: 11px; background: var(--gold); }
        .hamburger span:nth-child(3) { width: 15px; background: var(--rose); }
        .hamburger:hover span        { width: 18px !important; }

        /* ── MOBILE MENU ──────────────────────────────────── */
        .mobile-menu {
            display: none;
            flex-direction: column;
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 8px 24px 20px;
            position: relative;
            z-index: 2;
        }

        .mobile-menu a {
            font-family: 'Cormorant Garamond', serif;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.3px;
            color: var(--dim);
            text-decoration: none;
            padding: 13px 8px;
            border-bottom: 1px solid rgba(149,128,212,0.07);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: color 0.2s ease, padding-left 0.25s ease;
        }

        .mobile-menu a .m-index {
            font-family: 'DM Mono', monospace;
            font-size: 7px;
            color: var(--gold);
            opacity: 0.5;
            letter-spacing: 1px;
            transition: opacity 0.2s ease;
        }

        .mobile-menu a:last-child { border-bottom: none; }
        .mobile-menu a:hover { color: #f0eaff; padding-left: 16px; }
        .mobile-menu a:hover .m-index { opacity: 1; }
        .mobile-menu.open { display: flex; }

        @media (max-width: 620px) {
            body { overflow: visible; }
            .links-block { display: none; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>

        <div class="nav-inner">

            <div class="logo-block">
                <a href="index.html" target="_top">
                    <div class="logo-mark">
                        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle class="ring" cx="11" cy="11" r="8"
                                stroke="url(#lg1)" stroke-width="0.8" stroke-dasharray="3 2"/>
                            <circle cx="11" cy="11" r="3"
                                stroke="url(#lg2)" stroke-width="0.8"/>
                            <circle class="dot-center" cx="11" cy="11" r="2"
                                fill="url(#lg2)"/>
                            <circle cx="11"   cy="3.5" r="1"   fill="#c4b5e8" opacity="0.6"/>
                            <circle cx="18.5" cy="11"  r="0.8" fill="#e4c87a" opacity="0.5"/>
                            <circle cx="11"   cy="18.5" r="1"  fill="#d4a8b8" opacity="0.5"/>
                            <defs>
                                <linearGradient id="lg1" x1="0" y1="0" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                    <stop offset="0%"   stop-color="#9d87d4"/>
                                    <stop offset="100%" stop-color="#e4c87a"/>
                                </linearGradient>
                                <linearGradient id="lg2" x1="0" y1="0" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                    <stop offset="0%"   stop-color="#c4b5e8"/>
                                    <stop offset="100%" stop-color="#d4a8b8"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    Home
                </a>
            </div>

            <div class="links-block">
                <a href="Gambit.html"       target="_top" data-index="01">Who is Gambit</a>
                <a href="linktree.html"     target="_top" data-index="02">Linktree</a>
                <a href="CoolWebsites.html" target="_top" data-index="03">Cool Websites</a>
                <a href="Games.html"        target="_top" data-index="04">Games</a>
                <a href="blogpostpage.html" target="_top" data-index="05">Blog</a>
                <a href="friends.html"      target="_top" data-index="06">IRL Friends</a>
            </div>

            <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <a href="Gambit.html"       target="_top"><span class="m-index">01</span>Who is Gambit</a>
        <a href="linktree.html"     target="_top"><span class="m-index">02</span>Linktree</a>
        <a href="CoolWebsites.html" target="_top"><span class="m-index">03</span>Cool Websites</a>
        <a href="Games.html"        target="_top"><span class="m-index">04</span>Games</a>
        <a href="blogpostpage.html" target="_top"><span class="m-index">05</span>Blog</a>
        <a href="friends.html"      target="_top"><span class="m-index">06</span>IRL Friends</a>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('open');
            window.parent.postMessage({ iframeHeight: document.body.scrollHeight }, '*');
        }
    </script>
</body>
</html>
