<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - TBC8's website</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            position: relative;
            color: #fff;
            animation: glitch 2.5s infinite;
        }

        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .error-code::before {
            color: #ff007f;
            animation: glitch-top 2.5s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
        }

        .error-code::after {
            color: #00eaff;
            animation: glitch-bottom 2.5s infinite;
            clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            91% { transform: translate(-2px, 1px); }
            93% { transform: translate(2px, -1px); }
            95% { transform: translate(-1px, 2px); }
            97% { transform: translate(1px, -2px); }
        }

        @keyframes glitch-top {
            0%, 90%, 100% { transform: translate(0); opacity: 0; }
            91% { transform: translate(-4px, 0); opacity: 0.8; }
            93% { transform: translate(4px, 0); opacity: 0.8; }
            95% { transform: translate(-2px, 0); opacity: 0.8; }
            97% { transform: translate(0); opacity: 0; }
        }

        @keyframes glitch-bottom {
            0%, 90%, 100% { transform: translate(0); opacity: 0; }
            92% { transform: translate(4px, 0); opacity: 0.8; }
            94% { transform: translate(-4px, 0); opacity: 0.8; }
            96% { transform: translate(2px, 0); opacity: 0.8; }
            98% { transform: translate(0); opacity: 0; }
        }

        .error-subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #00eaff;
            margin: 1rem 0 0.5rem;
            animation: flicker 4s infinite;
        }

        .error-msg {
            font-size: 1rem;
            color: #aaa;
            max-width: 400px;
            margin: 0.5rem auto 2rem;
            line-height: 1.6;
        }

        .home-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #fff;
            border: 2px solid #00eaff;
            padding: 0.75rem 2rem;
            text-decoration: none;
            position: relative;
            transition: color 0.2s, background 0.2s;
        }

        .home-btn:hover {
            background: #00eaff;
            color: #000;
        }

        .home-btn::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: -4px;
            bottom: -4px;
            border: 2px solid #ff007f;
            z-index: -1;
            transition: all 0.2s;
        }

        .home-btn:hover::before {
            top: 2px;
            left: 2px;
        }

        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.3; }
            97% { opacity: 1; }
            98% { opacity: 0.2; }
            99% { opacity: 1; }
        }

        .scanline {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.05) 2px,
                rgba(0,0,0,0.05) 4px
            );
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <!-- Keeps the header iframe height in sync -->
    <script>
        window.addEventListener('message', function(e) {
            if (e.data && e.data.iframeHeight) {
                document.getElementById('header-frame').style.height = e.data.iframeHeight + 'px';
            }
        });
    </script>

    <!-- Background decorative cards (styled via CSS) -->
    <div class="floating-cards"></div>

    <!-- Shared site header -->
    <iframe id="header-frame" src="header.html" scrolling="no"></iframe>

    <div class="container-single">
        <main>
            <div class="error-wrapper">
                <div class="error-code">404</div>
                <div class="error-subtitle">Signal Lost</div>
                <p class="error-msg">The page you're looking for doesn't exist, got moved, or vanished into the void. Check the URL or head back home.
                <span>or email me at TheBigCoom8@gmail.com and let me know if you got here from a broken link<span></p>
                <a href="index.html" class="home-btn">&#8592; Back to Home</a>
            </div>
        </main>
    </div>

</body>
</html>
